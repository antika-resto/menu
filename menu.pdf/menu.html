<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Menu — Antika</title>
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#161512;
    --muted:#7a7268;
    --faint:#a9a196;
    --line:#ece8e1;
    --line-strong:#ddd7cc;
    --gold:#b08324;
    --gold-soft:#c9a24a;
    --card:#ffffff;
    --serif:"Cormorant Garamond",Georgia,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  img{display:block;max-width:100%}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:30;
    background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(12px);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .bar{
    max-width:680px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:11px 16px;
  }
  .back{
    display:inline-flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:11px;
    border:1px solid var(--line-strong);
    color:var(--ink);text-decoration:none;flex:0 0 auto;
    -webkit-tap-highlight-color:transparent;
  }
  .back:active{background:#f6f3ee}
  .brand{text-align:center;line-height:1;flex:1 1 auto;overflow:hidden}
  .brand .name{
    font-family:var(--serif);font-weight:600;
    font-size:25px;letter-spacing:.02em;
  }
  .brand .sub{
    font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--muted);margin-top:2px;
  }
  /* language chip + dropdown */
  .lang-wrap{position:relative;flex:0 0 auto}
  .lang-btn{
    display:inline-flex;align-items:center;gap:7px;
    height:38px;padding:0 12px;border-radius:11px;
    border:1px solid var(--line-strong);background:#fff;
    font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink);
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .lang-btn .fl{font-size:16px;line-height:1}
  .lang-btn .ca{color:var(--faint);font-size:10px;transition:transform .2s}
  .lang-wrap.open .lang-btn .ca{transform:rotate(180deg)}
  .lang-menu{
    position:absolute;right:0;top:46px;min-width:172px;
    background:#fff;border:1px solid var(--line-strong);border-radius:14px;
    box-shadow:0 18px 44px rgba(30,24,10,.16);
    padding:6px;opacity:0;visibility:hidden;transform:translateY(-6px);
    transition:opacity .16s ease,transform .16s ease,visibility .16s;
  }
  .lang-wrap.open .lang-menu{opacity:1;visibility:visible;transform:none}
  .lang-menu a{
    display:flex;align-items:center;gap:11px;
    padding:10px 12px;border-radius:9px;
    text-decoration:none;color:var(--ink);font-size:15px;font-weight:500;
  }
  .lang-menu a .fl{font-size:19px}
  .lang-menu a:active{background:#f6f3ee}
  .lang-menu a.on{color:var(--gold);font-weight:600}
  .lang-menu a.on::after{content:"✓";margin-left:auto;color:var(--gold);font-size:13px}

  /* ---------- Category nav ---------- */
  .cats{
    position:sticky;top:calc(61px + env(safe-area-inset-top));z-index:20;
    background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(12px);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  .cats-inner{
    max-width:680px;margin:0 auto;
    display:flex;gap:8px;overflow-x:auto;
    padding:10px 16px;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .cats-inner::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;white-space:nowrap;
    padding:8px 15px;border-radius:999px;
    border:1px solid var(--line-strong);background:#fff;
    font-size:13px;font-weight:500;color:var(--muted);
    text-decoration:none;-webkit-tap-highlight-color:transparent;
    transition:all .18s ease;cursor:pointer;
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---------- Content ---------- */
  main{max-width:680px;margin:0 auto;padding:0 16px}

  .hero{text-align:center;padding:30px 6px 10px}
  .hero .logo{width:110px;margin:0 auto 16px;opacity:.96}
  .hero .lead{
    font-family:var(--serif);font-style:italic;font-size:21px;
    color:var(--ink);line-height:1.35;
  }
  .hero .lead .al{display:block;font-style:normal;font-size:14px;color:var(--gold);letter-spacing:.04em;margin-top:6px}
  .hero .note{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.55}

  /* ---------- Recommandation du chef ---------- */
  .chef{
    margin:20px 0 6px;border:1px solid var(--line-strong);border-radius:20px;overflow:hidden;
    background:linear-gradient(180deg,#fffdf7,#ffffff);
    box-shadow:0 12px 34px rgba(40,30,10,.09);
  }
  .chef-ph{width:100%;height:212px;object-fit:cover;display:block}
  .chef-body{padding:18px 18px 20px}
  .chef-eyebrow{
    font-size:10.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
    color:var(--gold);display:flex;align-items:center;gap:7px;
  }
  .chef-eyebrow::before{content:"★";font-size:12px;line-height:1}
  .chef-titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:7px 0 9px}
  .chef-title{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.1}
  .chef-price{font-family:var(--serif);font-weight:600;font-size:27px;color:var(--gold);white-space:nowrap}
  .chef-desc{font-size:14px;color:var(--muted);line-height:1.55}
  .chef-plabel{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--ink);margin:15px 0 9px}
  .chef-preps{list-style:none;display:flex;flex-direction:column;gap:9px}
  .chef-preps li{font-size:13.5px;color:var(--ink);line-height:1.45;padding-left:16px;position:relative}
  .chef-preps li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold-soft)}
  .chef-preps b{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--gold)}
  @media (min-width:560px){
    .chef{display:flex;align-items:stretch}
    .chef-ph{width:44%;height:auto;min-height:236px}
    .chef-body{flex:1 1 auto;padding:24px 26px;align-self:center}
    .chef-title{font-size:34px}
  }

  section{padding-top:30px;scroll-margin-top:118px}
  .sec-head{text-align:center;margin-bottom:20px}
  .sec-head .t{
    font-family:var(--serif);font-weight:600;font-size:30px;
    letter-spacing:.01em;position:relative;display:inline-block;padding:0 2px;
  }
  .sec-head .s{
    display:block;font-family:var(--sans);
    font-size:10.5px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
    color:var(--gold);margin-bottom:9px;
  }
  .rule{
    display:flex;align-items:center;justify-content:center;gap:10px;margin-top:11px;
  }
  .rule::before,.rule::after{content:"";height:1px;width:38px;background:var(--line-strong)}
  .rule .dot{width:5px;height:5px;border-radius:50%;background:var(--gold-soft)}

  .item{
    display:flex;gap:14px;align-items:flex-start;
    padding:16px 0;border-bottom:1px solid var(--line);
  }
  .item:last-child{border-bottom:0}
  .item .txt{flex:1 1 auto;min-width:0}
  .item .row1{
    display:flex;align-items:baseline;gap:8px;
  }
  .item .nm{
    font-family:var(--serif);font-weight:600;font-size:20px;line-height:1.2;
    letter-spacing:.01em;color:var(--ink);
  }
  .item .lead-dots{
    flex:1 1 auto;border-bottom:1px dotted var(--line-strong);
    transform:translateY(-3px);min-width:14px;
  }
  .item .pr{
    font-family:var(--serif);font-weight:600;font-size:19px;
    color:var(--gold);white-space:nowrap;flex:0 0 auto;
  }
  .item .pr small{font-size:11px;font-weight:500;color:var(--muted);font-family:var(--sans);letter-spacing:.02em}
  .item .desc{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;max-width:44ch}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .badge{
    font-size:10.5px;font-weight:600;letter-spacing:.03em;
    color:var(--gold);background:#faf5ea;border:1px solid #efe3c8;
    padding:3px 9px;border-radius:999px;
  }
  .badge.day{color:#8a5a1e;background:#fbf1e4;border-color:#f0dcc2}
  .item .ph{
    flex:0 0 auto;width:92px;height:92px;border-radius:14px;
    object-fit:cover;background:#f3efe8;
    box-shadow:0 4px 14px rgba(40,30,10,.10);
    cursor:zoom-in;-webkit-tap-highlight-color:transparent;
  }
  .item.nophoto .ph{display:none}
  .ic-tile{
    flex:0 0 auto;width:54px;height:54px;border-radius:14px;
    display:inline-flex;align-items:center;justify-content:center;
    color:var(--gold);background:#faf6ec;border:1px solid #efe3c8;overflow:hidden;
  }
  .ic-tile svg{width:24px;height:24px}
  .ic-tile.logo{background:#fff;padding:5px}
  .ic-tile.logo img{width:100%;height:100%;object-fit:contain}
  .ic-tile.photo{background:#fff;padding:0}
  .ic-tile.photo img{width:100%;height:100%;object-fit:contain}
  .item.drow{align-items:center;gap:12px}

  .foot-note{
    font-size:12px;color:var(--muted);line-height:1.6;
    background:#faf8f3;border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;margin-top:16px;
  }
  .foot-note b{color:var(--ink);font-weight:600}

  footer{
    text-align:center;margin-top:44px;padding-top:26px;
    border-top:1px solid var(--line);
  }
  footer .fb{font-family:var(--serif);font-size:26px;font-weight:600}
  footer .fs{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  footer .fw{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:16px;text-decoration:none;display:inline-block}

  /* ---------- Lightbox ---------- */
  .lb{
    position:fixed;inset:0;z-index:60;
    background:rgba(15,12,6,.92);
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;visibility:hidden;transition:opacity .2s ease,visibility .2s;
  }
  .lb.show{opacity:1;visibility:visible}
  .lb img{max-width:100%;max-height:80vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lb .cap{position:absolute;left:0;right:0;bottom:calc(28px + env(safe-area-inset-bottom));text-align:center;color:#f3efe7;font-family:var(--serif);font-size:20px;padding:0 24px}
  .lb .x{position:absolute;top:calc(16px + env(safe-area-inset-top));right:18px;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:rgba(0,0,0,.3);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}

  @media (min-width:560px){
    .item .ph{width:104px;height:104px}
    .item .nm{font-size:22px}
    .hero .lead{font-size:24px}
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <a class="back" id="back" href="carte.html" aria-label="Retour">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="brand">
      <div class="name">Antika</div>
      <div class="sub">Molenveld</div>
    </div>
    <div class="lang-wrap" id="langWrap">
      <button class="lang-btn" id="langBtn" aria-haspopup="true">
        <span class="fl" id="langFlag">🇫🇷</span>
        <span id="langCode">FR</span>
        <span class="ca">▾</span>
      </button>
      <div class="lang-menu" id="langMenu"></div>
    </div>
  </div>
  <div class="cats">
    <div class="cats-inner" id="cats"></div>
  </div>
</header>

<main id="main"></main>

<div class="lb" id="lb">
  <div class="x" id="lbx">✕</div>
  <img id="lbimg" src="" alt="">
  <div class="cap" id="lbcap"></div>
</div>

<script src="desserts-data.js"></script>
<script src="icons.js"></script>

    preps:[["Natural","classically prepared with vegetables and herbs."],["White Wine","delicately cooked in an aromatic white wine sauce."],["Curry","creamy curry sauce with a subtle spicy touch."]] },
  al:{ eyebrow:"Sugjerimi i javës", title:"Midhje me Patate",
    desc:"Midhje të freskëta të ditës, të përgatitura me kujdes dhe të shërbyera me patate të skuqura krokante e të arta. Një klasik i shijshëm belg, plot shije të pastër.",
    plabel:"Zgjidhni nga 3 përgatitje:",
    preps:[["Natyrale","përgatitur klasikisht me perime dhe erëza."],["Verë e Bardhë","përgatitur me delikatesë në një salcë aromatike vere të bardhë."],["Curry","salcë curry kremoze me një prekje delikate pikante."]] }
};

function getLang(){
  var p = new URLSearchParams(location.search).get("lang");
  if(p && I18N[p]) return p;
  return "fr";
}

function render(lang){
  var L = I18N[lang] || I18N.fr;
  document.documentElement.lang = lang;

  // back -> hub de catégories dans la même langue
  document.getElementById("back").setAttribute("href", "carte.html?lang="+lang);

  // header lang chip
  var cur = LANGS.filter(function(x){return x.code===lang})[0] || LANGS[1];
  document.getElementById("langFlag").textContent = cur.flag;
  document.getElementById("langCode").textContent = cur.code.toUpperCase();

  // lang menu
  document.getElementById("langMenu").innerHTML = LANGS.map(function(x){
    return '<a class="'+(x.code===lang?"on":"")+'" href="?lang='+x.code+'"><span class="fl">'+x.flag+'</span>'+x.label+'</a>';
  }).join("");

  // desserts & digestifs (source partagée desserts-data.js)
  var DZ = window.DESSERTS || null;
  var DL = DZ ? (DZ.i18n[lang] || DZ.i18n.fr) : null;

  // category chips (nourriture + desserts)
  var chipsHtml = MENU.map(function(sec){
    return '<a class="chip" data-sec="'+sec.id+'" href="#'+sec.id+'">'+L.sections[sec.id].t+'</a>';
  }).join("");
  if(DZ){
    chipsHtml += DZ.sections.map(function(sec){
      return '<a class="chip" data-sec="'+sec.id+'" href="#'+sec.id+'">'+DL.sections[sec.id].t+'</a>';
    }).join("");
  }
  document.getElementById("cats").innerHTML = chipsHtml;

  // hero
  var html = ''+
    '<div class="hero">'+
      '<img class="logo" src="logo-antika.png" alt="Antika">'+
      '<div class="lead">'+L.hero.lead+'<span class="al">'+L.hero.al+'</span></div>'+
      '<div class="note">'+L.hero.note+'</div>'+
    '</div>';

  // recommandation du chef
  var cf = CHEF[lang] || CHEF.fr;
  html += '<div class="chef">'+
      '<img class="chef-ph" loading="lazy" src="'+CHEF.img+'" alt="'+cf.title+'">'+
      '<div class="chef-body">'+
        '<div class="chef-eyebrow">'+cf.eyebrow+'</div>'+
        '<div class="chef-titlerow"><div class="chef-title">'+cf.title+'</div>'+
          '<div class="chef-price">'+CHEF.price+' €</div></div>'+
        '<div class="chef-desc">'+cf.desc+'</div>'+
        '<div class="chef-plabel">'+cf.plabel+'</div>'+
        '<ul class="chef-preps">'+cf.preps.map(function(p){
          return '<li><b>'+p[0]+'</b> — '+p[1]+'</li>';
        }).join("")+'</ul>'+
      '</div>'+
    '</div>';

  // sections
  MENU.forEach(function(sec){
    var st = L.sections[sec.id];
    html += '<section id="'+sec.id+'">'+
      '<div class="sec-head"><span class="s">'+st.s+'</span>'+
      '<div class="t">'+st.t+'</div>'+
      '<div class="rule"><span class="dot"></span></div></div>';

    sec.items.forEach(function(it){
      var t = L.items[it.k] || {n:it.k, d:""};
      var priceExtra = it.pp ? ' <small>'+L.ui.perPers+'</small>' : '';
      var badges = "";
      if(it.tags){
        badges = '<div class="badges">'+it.tags.map(function(tg){
          if(tg==="min2") return '<span class="badge">'+L.ui.min2+'</span>';
          if(tg==="sundayonly") return '<span class="badge day">'+L.ui.sundayonly+'</span>';
          if(tg==="sunday1") return '<span class="badge day">'+L.ui.sunday1+'</span>';
          if(tg==="sunday2") return '<span class="badge day">'+L.ui.sunday2+'</span>';
          return "";
        }).join("")+'</div>';
      }
      var img = it.ph ? '<img class="ph" loading="lazy" src="'+PHOTOS+it.ph+'.jpg" alt="'+t.n+'" data-cap="'+t.n+'">' : '';
      html += '<div class="item'+(it.ph?"":" nophoto")+'">'+
          '<div class="txt">'+
            '<div class="row1"><span class="nm">'+t.n+'</span><span class="lead-dots"></span>'+
              '<span class="pr">€ '+it.p+priceExtra+'</span></div>'+
            (t.d?'<div class="desc">'+t.d+'</div>':'')+
            badges+
          '</div>'+
          img+
        '</div>';
    });

    if(sec.note && L.notes[sec.id]){
      html += '<div class="foot-note">'+L.notes[sec.id]+'</div>';
    }
    html += '</section>';
  });

  // desserts & digestifs — rappel en fin de carte (source partagée)
  if(DZ){
    html += '<div class="sec-head" style="margin-top:48px;padding-top:38px;border-top:1px solid var(--line-strong)">'+
      '<span class="s">'+DL.head.s+'</span>'+
      '<div class="t">'+DL.head.t+'</div>'+
      '<div class="rule"><span class="dot"></span></div></div>';
    DZ.sections.forEach(function(sec){
      var dt = DL.sections[sec.id];
      html += '<section id="'+sec.id+'" style="padding-top:22px">'+
        '<div class="sec-head"><span class="s">'+dt.s+'</span>'+
        '<div class="t">'+dt.t+'</div>'+
        '<div class="rule"><span class="dot"></span></div></div>';
      sec.items.forEach(function(it){
        var name = (DL.names && DL.names[it.k]) || it.n;
        if(sec.id==="desserts" && it.img){
          html += '<div class="item">'+
              '<div class="txt"><div class="row1"><span class="nm">'+name+'</span>'+
              '<span class="lead-dots"></span><span class="pr">€ '+it.p+'</span></div></div>'+
              '<img class="ph" loading="lazy" src="drinks/'+it.img+'" alt="'+name+'" data-cap="'+name+'">'+
            '</div>';
        } else {
          html += '<div class="item nophoto drow">'+
              window.brandTile(it.logo, sec.id, name, it.img)+
              '<div class="txt">'+
              '<div class="row1"><span class="nm">'+name+'</span><span class="lead-dots"></span>'+
              '<span class="pr">€ '+it.p+'</span></div></div></div>';
        }
      });
      html += '</section>';
    });
  }

  // footer
  html += '<footer>'+
      '<div class="fb">Antika</div>'+
      '<div class="fs">Resto · Lounge · Bar · Event</div>'+
      '<div class="note" style="max-width:420px;margin:14px auto 0">'+L.ui.group+'</div>'+
      '<a class="fw" href="https://www.'+L.ui.web+'" target="_blank" rel="noopener">'+L.ui.web+'</a>'+
    '</footer>';

  document.getElementById("main").innerHTML = html;
  wireLightbox();
  wireScrollSpy();
}

/* language dropdown */
var lw = document.getElementById("langWrap");
document.getElementById("langBtn").addEventListener("click", function(e){
  e.stopPropagation(); lw.classList.toggle("open");
});
document.addEventListener("click", function(){ lw.classList.remove("open"); });

/* lightbox */
function wireLightbox(){
  var lb=document.getElementById("lb"), img=document.getElementById("lbimg"), cap=document.getElementById("lbcap");
  document.querySelectorAll(".item .ph").forEach(function(el){
    el.addEventListener("click", function(){
      img.src=el.src; cap.textContent=el.getAttribute("data-cap")||""; lb.classList.add("show");
    });
  });
  function close(){ lb.classList.remove("show"); img.src=""; }
  document.getElementById("lbx").addEventListener("click", close);
  lb.addEventListener("click", function(e){ if(e.target===lb) close(); });
}

/* scroll-spy for category chips */
function wireScrollSpy(){
  var chips = [].slice.call(document.querySelectorAll(".chip"));
  var secs = [].slice.call(document.querySelectorAll("section"));
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){
        var id=en.target.id;
        chips.forEach(function(c){ c.classList.toggle("active", c.getAttribute("data-sec")===id); });
        var active=document.querySelector(".chip.active");
        if(active) active.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
      }
    });
  },{rootMargin:"-120px 0px -70% 0px",threshold:0});
  secs.forEach(function(s){ if(s) obs.observe(s); });

  chips.forEach(function(c){
    c.addEventListener("click", function(e){
      e.preventDefault();
      var t=document.getElementById(c.getAttribute("data-sec"));
      if(t) window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-112,behavior:"smooth"});
    });
  });
}

render(getLang());
</script>
</body>
</html>
