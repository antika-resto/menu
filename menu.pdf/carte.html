<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Menu — Antika</title>
<meta name="theme-color" content="#0d0d0d">
<style>
  :root{
    --bg:#0d0d0d;
    --card:#161616;
    --line:rgba(255,255,255,.12);
    --ink:#f3efe7;
    --muted:#9a938a;
    --gold:#c9a24a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px calc(32px + env(safe-area-inset-bottom));
    text-align:center;
  }
  .back{
    position:fixed;
    top:calc(16px + env(safe-area-inset-top));
    left:16px;
    display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:42px;border-radius:12px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .back:active{transform:scale(.96)}
  .logo{
    width:min(210px,58vw);
    height:auto;
    margin-bottom:22px;
  }
  .pick{
    font-size:12px;
    font-weight:500;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:26px;
  }
  .cats{
    width:100%;
    max-width:360px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .cat{
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    padding:20px 20px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    color:var(--ink);
    text-decoration:none;
    text-align:left;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .2s ease, background .2s ease, transform .05s ease;
  }
  .cat:active{transform:scale(.98)}
  .cat:hover{border-color:var(--gold);background:#1c1c1c}
  .cat .ic{
    flex:0 0 auto;
    width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
    border:1px solid rgba(201,162,74,.35);
    background:rgba(201,162,74,.07);
  }
  .cat .txt{flex:1 1 auto;min-width:0}
  .cat .t{
    display:block;
    font-size:19px;
    font-weight:600;
    letter-spacing:.01em;
    line-height:1.2;
  }
  .cat .s{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    margin-top:3px;
    line-height:1.3;
  }
  .cat .arw{flex:0 0 auto;color:var(--muted)}
  footer{
    margin-top:38px;
    font-size:12px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#5a554e;
  }
</style>
</head>
<body>

  <a class="back" href="index.html" aria-label="Retour">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>

  <img class="logo" src="logo-antika-white.png" alt="Antika">

  <div class="pick" id="pick">Choisissez</div>

  <nav class="cats" id="cats"></nav>

  <footer>Antika</footer>

<script>
  var T = {
    fr:{ pick:"Faites votre choix",
      drinks:{t:"Boissons", s:"La carte des boissons"},
      food:{t:"Nourriture", s:"La carte du restaurant"},
      dessert:{t:"Dessert & Digestif", s:"Douceurs & pousse-café"} },
    nl:{ pick:"Maak uw keuze",
      drinks:{t:"Dranken", s:"De drankenkaart"},
      food:{t:"Eten", s:"De menukaart"},
      dessert:{t:"Dessert & Digestief", s:"Zoet & digestief"} },
    en:{ pick:"Make your choice",
      drinks:{t:"Drinks", s:"The drinks menu"},
      food:{t:"Food", s:"The full menu"},
      dessert:{t:"Dessert & Digestif", s:"Sweets & after-dinner"} },
    al:{ pick:"Bëni zgjedhjen tuaj",
      drinks:{t:"Pije", s:"Lista e pijeve"},
      food:{t:"Ushqim", s:"Menuja e plotë"},
      dessert:{t:"Ëmbëlsira & Digestive", s:"Ëmbëlsira & digestive"} }
  };

  var IC = {
    drinks:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14l-7 8z"/><path d="M12 12v7"/><path d="M8 21h8"/></svg>',
    food:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v7a3 3 0 0 0 6 0V3M7 3v18M20 3c-2 0-3 2-3 5s1 4 3 4M20 3v18"/></svg>',
    dessert:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3l1 2M12 2v3M16 3l-1 2M5 9h14M6 9l1.4 10.2A2 2 0 0 0 9.4 21h5.2a2 2 0 0 0 2-1.8L18 9"/></svg>'
  };
  var ARW = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

  function getLang(){
    var p = new URLSearchParams(location.search).get("lang");
    return (p && T[p]) ? p : "fr";
  }

  var lang = getLang();
  var L = T[lang];
  document.documentElement.lang = lang;
  document.getElementById("pick").textContent = L.pick;

  var links = [
    {key:"drinks",  href:"boisson.pdf"},
    {key:"food",    href:"menu.html?lang="+lang},
    {key:"dessert", href:"dessert.html?lang="+lang}
  ];

  document.getElementById("cats").innerHTML = links.map(function(x){
    var c = L[x.key];
    return '<a class="cat" href="'+x.href+'">'+
        '<span class="ic">'+IC[x.key]+'</span>'+
        '<span class="txt"><span class="t">'+c.t+'</span><span class="s">'+c.s+'</span></span>'+
        '<span class="arw">'+ARW+'</span>'+
      '</a>';
  }).join("");
</script>
</body>
</html>
