<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Menu — Antika</title>
<meta name="theme-color" content="#0d0d0d">
<style>
  :root{
    --bg:#0d0d0d;
    --card:#161616;
    --line:rgba(255,255,255,.12);
    --ink:#f3efe7;
    --muted:#9a938a;
    --gold:#c9a24a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px calc(32px + env(safe-area-inset-bottom));
    text-align:center;
  }
  .logo{
    width:min(190px,56vw);
    height:auto;
    margin-bottom:30px;
    border-radius:18px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  h1{
    font-size:15px;
    font-weight:500;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:32px;
  }
  .langs{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .lang{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:18px 20px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    color:var(--ink);
    font-size:18px;
    font-weight:500;
    letter-spacing:.02em;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .2s ease, background .2s ease, transform .05s ease;
  }
  .lang:active{transform:scale(.98)}
  .lang:hover{border-color:var(--gold);background:#1c1c1c}
  .lang .flag{font-size:22px;line-height:1}
  .lang .code{
    margin-left:auto;
    font-size:12px;
    letter-spacing:.14em;
    color:var(--muted);
    text-transform:uppercase;
  }
  footer{
    margin-top:40px;
    font-size:12px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#5a554e;
  }
  /* écran d'attente pendant la lecture de la config / redirection événement */
  #loading{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);
    color:var(--muted);
    font-size:13px;letter-spacing:.2em;text-transform:uppercase;
    z-index:10;
  }
  .hidden{display:none !important}
</style>
</head>
<body>
  <div id="loading">Chargement…</div>

  <img class="logo" src="logo-antika.png" alt="Antika">
  <h1>Kies je taal · Choisissez votre langue</h1>

  <nav class="langs">
    <a class="lang" href="menu-nl.pdf"><span class="flag">🇳🇱</span> Nederlands <span class="code">NL</span></a>
    <a class="lang" href="menu-fr.pdf"><span class="flag">🇫🇷</span> Français <span class="code">FR</span></a>
    <!-- Albanais : ajoutez menu-al.pdf dans ce dossier puis décommentez la ligne ci-dessous -->
    <!-- <a class="lang" href="menu-al.pdf"><span class="flag">🇦🇱</span> Shqip <span class="code">AL</span></a> -->
  </nav>

  <footer>Antika</footer>

<script>
  // Mode événement : si config.json => event.enabled = true,
  // on saute le choix de langue et on affiche directement le menu de l'événement.
  (function () {
    var loading = document.getElementById('loading');
    fetch('config.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (cfg) {
        if (cfg && cfg.event && cfg.event.enabled) {
          window.location.replace(cfg.event.file || 'event.pdf');
        } else {
          loading.classList.add('hidden');
        }
      })
      .catch(function () {
        // pas de config lisible (ex: ouverture locale) => on affiche le choix de langue
        loading.classList.add('hidden');
      });
  })();
</script>
</body>
</html>
